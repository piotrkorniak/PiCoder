<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- 3D mesh grid -->
  <path d="M12 44 L32 52 L52 44 L52 28 L32 20 L12 28 Z" stroke="#4FC3F7" stroke-width="1.5" fill="#0D1B2A" opacity="0.8"/>
  <path d="M12 28 L32 36 L52 28" stroke="#4FC3F7" stroke-width="1" opacity="0.6"/>
  <path d="M32 36 L32 52" stroke="#4FC3F7" stroke-width="1" opacity="0.6"/>
  <path d="M22 24 L22 40" stroke="#4FC3F7" stroke-width="0.7" opacity="0.4"/>
  <path d="M42 24 L42 40" stroke="#4FC3F7" stroke-width="0.7" opacity="0.4"/>
  <path d="M12 36 L52 36" stroke="#4FC3F7" stroke-width="0.7" opacity="0.4"/>

  <!-- Drone body -->
  <ellipse cx="32" cy="16" rx="4" ry="2.5" fill="#E0E0E0"/>

  <!-- Drone arms -->
  <line x1="28" y1="16" x2="20" y2="12" stroke="#B0BEC5" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36" y1="16" x2="44" y2="12" stroke="#B0BEC5" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28" y1="16" x2="20" y2="20" stroke="#B0BEC5" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36" y1="16" x2="44" y2="20" stroke="#B0BEC5" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Propellers -->
  <ellipse cx="20" cy="12" rx="5" ry="1.5" fill="#81D4FA" opacity="0.5"/>
  <ellipse cx="44" cy="12" rx="5" ry="1.5" fill="#81D4FA" opacity="0.5"/>
  <ellipse cx="20" cy="20" rx="5" ry="1.5" fill="#81D4FA" opacity="0.5"/>
  <ellipse cx="44" cy="20" rx="5" ry="1.5" fill="#81D4FA" opacity="0.5"/>

  <!-- Flight path indicator -->
  <path d="M32 19 L32 28" stroke="#FF7043" stroke-width="1" stroke-dasharray="2 1.5" opacity="0.8"/>
  <circle cx="32" cy="28" r="1.5" fill="#FF7043" opacity="0.8"/>
</svg>
